name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q

      - name: Validate tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]

          if actual_tag != expected_tag:
              raise SystemExit(f"Tag {actual_tag!r} does not match pyproject version {expected_tag!r}.")
          PY

      - name: Extract release notes from changelog
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python scripts/extract_release_notes.py "${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
